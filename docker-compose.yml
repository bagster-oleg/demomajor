services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: majorauto
      POSTGRES_PASSWORD: majorauto
      POSTGRES_DB: majorauto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U majorauto"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://majorauto:majorauto@postgres:5432/majorauto
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - .:/srv

volumes:
  pgdata:
