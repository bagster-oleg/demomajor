services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-majorauto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-majorauto}
      POSTGRES_DB: ${POSTGRES_DB:-majorauto}
    ports:
      # Loopback-only: this box hosts other public services too, no reason
      # to expose Postgres beyond the docker network + local psql access.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-majorauto}"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://majorauto:majorauto@postgres:5432/majorauto}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
    ports:
      # BACKEND_PORT lets each deployment pick a free host port (this app
      # shares the box with other services on 8000/8001) without exposing
      # it beyond loopback - nginx (or the local dev browser) is the only
      # thing that talks to it directly.
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/srv

volumes:
  pgdata:
